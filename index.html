<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro | Advanced Weather Insights</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>

    <div class="app-container">
        <header class="search-section">
            <button id="geo-btn" class="icon-btn"><i data-feather="map-pin"></i></button>
            <div class="search-bar">
                <input type="text" id="city-input" placeholder="Search City (e.g. Mumbai, London)..." autocomplete="off">
                <button id="search-btn"><i data-feather="search"></i></button>
            </div>
        </header>

        <div id="error-msg" class="error-card" style="display: none;">
            <p>Oops! City not found. Please try again.</p>
        </div>

        <main id="weather-display" class="fade-in">
            <section class="current-weather">
                <div class="main-info">
                    <h1 id="city-name">--</h1>
                    <p id="current-date">--</p>
                    <div class="temp-wrapper">
                        <img id="weather-icon" src="https://openweathermap.org/img/wn/10d@4x.png" alt="Weather Icon">
                        <h2 id="main-temp">--</h2>
                    </div>
                    <h3 id="weather-desc">Cloudy</h3>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <i data-feather="thermometer"></i>
                        <span>Feels Like</span>
                        <p id="feels-like">--</p>
                    </div>
                    <div class="stat-item">
                        <i data-feather="droplet"></i>
                        <span>Humidity</span>
                        <p id="humidity">--</p>
                    </div>
                    <div class="stat-item">
                        <i data-feather="wind"></i>
                        <span>Wind</span>
                        <p id="wind-speed">--</p>
                    </div>
                    <div class="stat-item">
                        <i data-feather="sunrise"></i>
                        <span>Pressure</span>
                        <p id="pressure">--</p>
                    </div>
                </div>
            </section>

            <section class="forecast-section">
                <h4>5-Day Forecast</h4>
                <div class="forecast-grid" id="forecast-container">
                    </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>feather.replace();</script>
</body>
</html>
